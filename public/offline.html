<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You're Offline – 75 Club</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        color: #ffffff;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 24px;
        text-align: center;
        gap: 0;
      }

      .logo {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        border: 3px solid #ff6b35;
        padding: 8px;
        margin-bottom: 28px;
        background: #111;
      }

      .icon {
        font-size: 56px;
        margin-bottom: 20px;
        animation: pulse 2s ease-in-out infinite;
      }

      h1 {
        font-size: clamp(24px, 5vw, 36px);
        font-weight: 900;
        letter-spacing: -0.5px;
        margin-bottom: 12px;
        color: #ffffff;
      }

      p {
        font-size: 16px;
        color: #a0a0a0;
        max-width: 320px;
        line-height: 1.6;
        margin-bottom: 36px;
      }

      .card {
        background: #111;
        border: 2px solid #222;
        border-radius: 16px;
        padding: 20px 24px;
        max-width: 320px;
        width: 100%;
        margin-bottom: 32px;
        text-align: left;
      }

      .card-title {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #ff6b35;
        margin-bottom: 12px;
      }

      .tip {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        font-size: 14px;
        color: #c0c0c0;
        padding: 8px 0;
        border-bottom: 1px solid #1e1e1e;
      }
      .tip:last-child {
        border-bottom: none;
      }
      .tip-icon {
        flex-shrink: 0;
        font-size: 16px;
        margin-top: 1px;
      }

      button {
        background: #ff6b35;
        color: #fff;
        border: none;
        border-radius: 12px;
        padding: 14px 32px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.02em;
        transition:
          opacity 0.2s,
          transform 0.15s;
      }
      button:active {
        opacity: 0.85;
        transform: scale(0.97);
      }

      .status {
        margin-top: 20px;
        font-size: 13px;
        color: #555;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.08);
        }
      }
    </style>
  </head>
  <body>
    <div class="icon">📶</div>

    <h1>You're Offline</h1>
    <p>
      75 Club needs an internet connection to check your attendance and sync
      data.
    </p>

    <div class="card">
      <div class="card-title">What you can do</div>
      <div class="tip">
        <span class="tip-icon">📶</span>
        <span>Check your Wi-Fi or mobile data connection</span>
      </div>
      <div class="tip">
        <span class="tip-icon">✈️</span>
        <span>Turn off Airplane mode if it's on</span>
      </div>
      <div class="tip">
        <span class="tip-icon">🔄</span>
        <span>Try again once you're back online</span>
      </div>
    </div>

    <button onclick="tryReload()">Try Again</button>

    <div class="status" id="status"></div>

    <script>
      function tryReload() {
        const btn = document.querySelector("button");
        btn.textContent = "Checking…";
        btn.disabled = true;

        fetch("/", { method: "HEAD", cache: "no-store" })
          .then(() => window.location.reload())
          .catch(() => {
            btn.textContent = "Still offline – try again";
            btn.disabled = false;
            document.getElementById("status").textContent =
              "Still no connection. Please check your network.";
          });
      }

      // Auto-reload when connection is restored
      window.addEventListener("online", () => {
        document.getElementById("status").textContent =
          "🟢 Back online! Reloading…";
        setTimeout(() => window.location.reload(), 800);
      });

      if (navigator.onLine === false) {
        document.getElementById("status").textContent = "No network detected";
      }
    </script>
  </body>
</html>
